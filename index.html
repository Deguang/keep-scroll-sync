<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <style>
            :root {
                --accent: #2f7d5b;
                --accent-hover: #266a4d;
                --accent-soft: #e6f2ec;
                --bg: #ffffff;
                --surface: #f2f9f5;
                --text: #1f2a26;
                --text-dim: #7c8a83;
                --border: #dfeae4;
            }
            * { box-sizing: border-box; }
            body {
                width: 320px;
                margin: 0;
                padding: 16px;
                background: var(--bg);
                color: var(--text);
                font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
                -webkit-font-smoothing: antialiased;
            }
            .header {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 14px;
            }
            .header img { width: 22px; height: 22px; }
            #title {
                margin: 0;
                font-size: 15px;
                font-weight: 600;
                letter-spacing: .2px;
            }
            .actions {
                display: flex;
                gap: 8px;
                margin-bottom: 16px;
            }
            button {
                flex: 1;
                border: none;
                padding: 9px 10px;
                border-radius: 9px;
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                outline: none;
                transition: background .15s ease, box-shadow .15s ease, transform .05s ease;
            }
            button:active { transform: translateY(1px); }
            .save-scroll {
                background: var(--accent);
                color: #fff;
            }
            .save-scroll:hover { background: var(--accent-hover); }
            .del-scroll {
                background: var(--surface);
                color: var(--text-dim);
            }
            .del-scroll:hover { background: var(--accent-soft); color: var(--text); }

            .list-title {
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: .6px;
                color: var(--text-dim);
                margin: 4px 2px 8px;
            }
            .saved-list {
                max-height: 280px;
                overflow-y: auto;
                margin: 0 -4px;
            }
            .saved-list::-webkit-scrollbar { width: 6px; }
            .saved-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

            .item {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 8px 8px;
                border-radius: 9px;
                cursor: pointer;
                transition: background .12s ease;
            }
            .item:hover { background: var(--surface); }
            .item .favicon {
                width: 16px; height: 16px;
                flex: 0 0 16px;
                border-radius: 3px;
                object-fit: contain;
            }
            .item .meta { flex: 1 1 auto; min-width: 0; }
            .item .item-title {
                font-size: 13px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .item .item-url {
                font-size: 11px;
                color: var(--text-dim);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .item .pct {
                flex: 0 0 auto;
                font-size: 11px;
                font-weight: 600;
                color: var(--accent);
                background: var(--accent-soft);
                padding: 2px 7px;
                border-radius: 999px;
            }
            .item .remove {
                flex: 0 0 auto;
                width: 22px; height: 22px;
                padding: 0;
                border-radius: 6px;
                background: transparent;
                color: var(--text-dim);
                font-size: 15px;
                line-height: 1;
                opacity: 0;
                transition: opacity .12s ease, background .12s ease, color .12s ease;
            }
            .item:hover .remove { opacity: 1; }
            .item .remove:hover { background: #ffe8e8; color: #e05656; }

            .empty {
                text-align: center;
                color: var(--text-dim);
                font-size: 13px;
                padding: 26px 8px;
            }
            .footer {
                margin-top: 14px;
                padding-top: 10px;
                border-top: 1px solid var(--border);
                text-align: center;
            }
            .go-issues {
                font-size: 11px;
                color: var(--text-dim);
                text-decoration: none;
            }
            .go-issues:hover { color: var(--accent); }
        </style>
    </head>
    <body>
        <div class="header">
            <img src="images/logo_32.png" alt="">
            <h3 id="title" data-i18n="appTitle">Keep Scroll Sync</h3>
        </div>

        <div class="actions">
            <button class="save-scroll" data-i18n="saveBtn">Save scroll position</button>
            <button class="del-scroll" data-i18n="delBtn">Del scroll history</button>
        </div>

        <div class="list-title" data-i18n="listTitle">Saved pages</div>
        <div class="saved-list"></div>

        <div class="footer">
            <a class="go-issues" href="https://github.com/Deguang/keep-scroll-sync/issues" target="_blank" data-i18n="feedback">Some advice or feedback?</a>
        </div>

        <script src="js/popup.js"></script>
    </body>
</html>
